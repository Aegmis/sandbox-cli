name: release

# Pushing a version tag publishes the release: cross-compiled archives for
# linux/macOS/Windows on amd64+arm64, checksums, changelog, and the Homebrew
# cask. Nothing is built on a laptop.
on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # GoReleaser builds the changelog from history, so it needs all of it.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --skip=validate
        env:
          # Publishes the release in this repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Only needed to push the Homebrew cask to Aegmis/homebrew-tap:
          # a PAT with write access to that repo, stored as a repo secret.
          # If the secret is absent this is empty, and .goreleaser.yaml skips
          # the cask upload rather than failing the release.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
