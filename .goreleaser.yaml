# GoReleaser config — https://goreleaser.com
#
# Local dry run (no publishing, artifacts land in ./dist):
#   goreleaser release --snapshot --clean
#   goreleaser build --snapshot --clean --single-target
#
# Real release (needs an authenticated gh/GITHUB_TOKEN and push rights):
#   git tag 0.0.1beta.1 && git push origin 0.0.1beta.1
#   goreleaser release --clean --skip=validate
#
# --skip=validate is required because our tags are not valid semver
# ("0.0.1beta.1" — semver would want "v0.0.1-beta.1"), and GoReleaser parses the
# tag as semver during validation. Skipping it also disables the dirty-worktree
# and tag-matches-HEAD checks, so release from a clean checkout of the tag.
# Switching to semver tags later would let this flag be dropped.
version: 2

project_name: sandbox-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: sandbox-cli
    main: ./cmd/sandbox-cli
    binary: sandbox-cli
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/Aegmis/sandbox-cli/internal/version.Version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    # tar.gz everywhere except Windows, which gets a zip — the convention most
    # installers and package managers expect.
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request

release:
  # Explicitly true rather than `auto`: auto-detection parses the tag as semver,
  # and ours ("0.0.1beta.1") is not valid semver, so it cannot infer the
  # pre-release marker. Set this to false for a stable release.
  prerelease: true
  draft: false
  footer: |
    ## Install

    ```sh
    curl -fsSL https://raw.githubusercontent.com/Aegmis/sandbox-cli/main/install.sh | sh
    ```

    Or with Homebrew:

    ```sh
    brew install Aegmis/tap/sandbox-cli
    ```

    Verify downloads against `checksums.txt`.

# Homebrew cask, pushed to github.com/Aegmis/homebrew-tap on release. Homebrew
# distributes prebuilt binaries as casks, so this is the current equivalent of
# the old `brews:` formula block.
#
# Publishing the cask needs the tap repository to exist and HOMEBREW_TAP_TOKEN to
# be a PAT that can write to it (the default GITHUB_TOKEN only covers this repo).
# When that variable is empty the cask is still generated into ./dist but the
# upload is skipped, so a release does not fail before the tap is set up.
homebrew_casks:
  - name: sandbox-cli
    binaries:
      - sandbox-cli
    skip_upload: '{{ if .Env.HOMEBREW_TAP_TOKEN }}false{{ else }}true{{ end }}'
    repository:
      owner: Aegmis
      name: homebrew-tap
      # Must be exactly {{ .Env.VAR }} — GoReleaser rejects any other
      # interpolation in a token field.
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: https://github.com/Aegmis/sandbox-cli
    description: Run AI coding agents in a disposable, isolated Docker container
    license: mit
    dependencies:
      - cask: docker
    # Strip the quarantine attribute so the unsigned binary runs on macOS
    # without a Gatekeeper prompt.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/sandbox-cli"]
          end
