name: release

# Pushing a version tag publishes the release: cross-compiled archives for
# linux/macOS/Windows on amd64+arm64, checksums, and the changelog. Nothing is
# built on a laptop.
on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # GoReleaser builds the changelog from history, so it needs all of it.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --skip=validate
        env:
          # Publishes the release in this repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
