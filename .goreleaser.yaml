# GoReleaser config — https://goreleaser.com
#
# Local dry run (no publishing, artifacts land in ./dist):
#   goreleaser release --snapshot --clean
#   goreleaser build --snapshot --clean --single-target
#
# Real release (needs an authenticated gh/GITHUB_TOKEN and push rights):
#   git tag 0.0.1beta.1 && git push origin 0.0.1beta.1
#   goreleaser release --clean --skip=validate
#
# --skip=validate is required because our tags are not valid semver
# ("0.0.1beta.1" — semver would want "v0.0.1-beta.1"), and GoReleaser parses the
# tag as semver during validation. Skipping it also disables the dirty-worktree
# and tag-matches-HEAD checks, so release from a clean checkout of the tag.
# Switching to semver tags later would let this flag be dropped.
version: 2

project_name: sandbox-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: sandbox-cli
    main: ./cmd/sandbox-cli
    binary: sandbox-cli
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/Amitgb14/sandbox-cli/internal/version.Version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    # tar.gz everywhere except Windows, which gets a zip — the convention most
    # installers and package managers expect.
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request

release:
  # Explicitly true rather than `auto`: auto-detection parses the tag as semver,
  # and ours ("0.0.1beta.1") is not valid semver, so it cannot infer the
  # pre-release marker. Set this to false for a stable release.
  prerelease: true
  draft: false
  # Re-running a release (after fixing a failure, or re-triggering the workflow)
  # would otherwise abort with "422 already_exists" on the first asset that a
  # previous partial run had already uploaded. Overwrite instead, so publishing
  # is idempotent and safe to retry.
  replace_existing_artifacts: true
  footer: |
    ## Install

    ```sh
    curl -fsSL https://raw.githubusercontent.com/Amitgb14/sandbox-cli/main/install.sh | sh
    ```

    Verify downloads against `checksums.txt`.
